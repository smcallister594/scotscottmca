# Setup
title: ScotScottMcA
description: Just a blog on things I find interesting.
url: https://scotscottmca.com
avatar: /assets/img/me_1.png
paginate: 5
permalink: pretty
cover_image: /assets/img/Scot_Flag.png

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec

# Optimize Jekyl SEO Tag
twitter:
  username: scotscottmca
  card: summary
logo: logo.png
social:
  name: Scott McAllister
  links:
    - https://twitter.com/scotscottmca
    - https://github.com/smcallister594
google_site_verification: xxxxx
lang: en

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
# google_analytics: UA-000000-0

# Replace this value and uncomment to enable Disqus
# disqus: xxxxxx

# Specify the author for blog posts
author:
  name: Scott McAllister
  url: https://github.com/smcallister594
#  email: vszhub@gmail.com
